<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" preserveAspectRatio="xMidYMid slice">
  <!-- 天空渐变背景 -->
  <defs>
    <linearGradient id="skyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#87CEEB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E0F6FF;stop-opacity:1" />
    </linearGradient>
    
    <!-- 云朵阴影 -->
    <filter id="cloudShadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="2" dy="2" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.2"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- 天空 -->
  <rect width="1200" height="800" fill="url(#skyGradient)"/>
  
  <!-- 太阳 -->
  <circle cx="150" cy="120" r="50" fill="#FFD700" opacity="0.8"/>
  <circle cx="150" cy="120" r="45" fill="#FFF4A3"/>
  
  <!-- 太阳光芒 -->
  <g opacity="0.6">
    <line x1="150" y1="50" x2="150" y2="30" stroke="#FFD700" stroke-width="3" stroke-linecap="round"/>
    <line x1="200" y1="70" x2="215" y2="55" stroke="#FFD700" stroke-width="3" stroke-linecap="round"/>
    <line x1="220" y1="120" x2="240" y2="120" stroke="#FFD700" stroke-width="3" stroke-linecap="round"/>
    <line x1="200" y1="170" x2="215" y2="185" stroke="#FFD700" stroke-width="3" stroke-linecap="round"/>
    <line x1="100" y1="70" x2="85" y2="55" stroke="#FFD700" stroke-width="3" stroke-linecap="round"/>
    <line x1="80" y1="120" x2="60" y2="120" stroke="#FFD700" stroke-width="3" stroke-linecap="round"/>
  </g>
  
  <!-- 云朵 -->
  <g filter="url(#cloudShadow)">
    <!-- 云朵1 -->
    <ellipse cx="300" cy="100" rx="40" ry="25" fill="#FFFFFF"/>
    <ellipse cx="330" cy="95" rx="35" ry="22" fill="#FFFFFF"/>
    <ellipse cx="270" cy="105" rx="30" ry="20" fill="#FFFFFF"/>
    
    <!-- 云朵2 -->
    <ellipse cx="900" cy="150" rx="50" ry="30" fill="#FFFFFF"/>
    <ellipse cx="935" cy="145" rx="40" ry="25" fill="#FFFFFF"/>
    <ellipse cx="865" cy="155" rx="35" ry="22" fill="#FFFFFF"/>
    
    <!-- 云朵3 -->
    <ellipse cx="1050" cy="80" rx="35" ry="20" fill="#FFFFFF"/>
    <ellipse cx="1075" cy="77" rx="30" ry="18" fill="#FFFFFF"/>
    <ellipse cx="1025" cy="83" rx="28" ry="17" fill="#FFFFFF"/>
  </g>
  
  <!-- 草地 -->
  <ellipse cx="600" cy="750" rx="700" ry="100" fill="#90EE90"/>
  <ellipse cx="600" cy="730" rx="650" ry="80" fill="#98FB98"/>
  
  <!-- 小草 -->
  <g opacity="0.7">
    <path d="M 100 700 Q 105 680 110 700" stroke="#228B22" stroke-width="2" fill="none"/>
    <path d="M 200 710 Q 205 690 210 710" stroke="#228B22" stroke-width="2" fill="none"/>
    <path d="M 350 705 Q 355 685 360 705" stroke="#228B22" stroke-width="2" fill="none"/>
    <path d="M 850 708 Q 855 688 860 708" stroke="#228B22" stroke-width="2" fill="none"/>
    <path d="M 950 703 Q 955 683 960 703" stroke="#228B22" stroke-width="2" fill="none"/>
    <path d="M 1100 707 Q 1105 687 1110 707" stroke="#228B22" stroke-width="2" fill="none"/>
  </g>
  
  <!-- 风筝线 -->
  <path d="M 750 200 Q 650 350 580 520" stroke="#666" stroke-width="2" fill="none" stroke-dasharray="5,5"/>
  
  <!-- 风筝 -->
  <g transform="translate(750, 200)">
    <!-- 风筝主体 - 菱形 -->
    <path d="M 0 -40 L 30 0 L 0 40 L -30 0 Z" fill="#FF6B9D" stroke="#FF1493" stroke-width="2"/>
    <path d="M 0 -40 L 30 0 L 0 40 L -30 0 Z" fill="#FFB6C1" opacity="0.5"/>
    
    <!-- 风筝装饰线 -->
    <line x1="-30" y1="0" x2="30" y2="0" stroke="#FF1493" stroke-width="2"/>
    <line x1="0" y1="-40" x2="0" y2="40" stroke="#FF1493" stroke-width="2"/>
    
    <!-- 风筝尾巴 -->
    <g>
      <ellipse cx="0" cy="50" rx="8" ry="12" fill="#FFD700"/>
      <ellipse cx="5" cy="70" rx="8" ry="12" fill="#87CEEB"/>
      <ellipse cx="-3" cy="90" rx="8" ry="12" fill="#FF6B9D"/>
      <ellipse cx="4" cy="110" rx="8" ry="12" fill="#98FB98"/>
    </g>
  </g>
  
  <!-- 小鸟 -->
  <g transform="translate(450, 180)">
    <path d="M 0 0 Q -10 -5 -15 0 Q -10 5 0 0" fill="#333"/>
    <path d="M 0 0 Q 10 -5 15 0 Q 10 5 0 0" fill="#333"/>
  </g>
  
  <g transform="translate(520, 160)">
    <path d="M 0 0 Q -10 -5 -15 0 Q -10 5 0 0" fill="#333"/>
    <path d="M 0 0 Q 10 -5 15 0 Q 10 5 0 0" fill="#333"/>
  </g>
  
  <!-- 小孩 -->
  <g transform="translate(580, 520)">
    <!-- 身体 -->
    <ellipse cx="0" cy="30" rx="25" ry="35" fill="#4A90E2"/>
    
    <!-- 腿 -->
    <rect x="-15" y="60" width="12" height="35" rx="6" fill="#2C5F8D"/>
    <rect x="3" y="60" width="12" height="35" rx="6" fill="#2C5F8D"/>
    
    <!-- 鞋子 -->
    <ellipse cx="-9" cy="95" rx="8" ry="5" fill="#333"/>
    <ellipse cx="9" cy="95" rx="8" ry="5" fill="#333"/>
    
    <!-- 手臂（举着风筝线的手） -->
    <rect x="-35" y="15" width="12" height="30" rx="6" fill="#FFD4A3" transform="rotate(-45 -29 30)"/>
    <rect x="23" y="25" width="12" height="25" rx="6" fill="#FFD4A3" transform="rotate(20 29 37)"/>
    
    <!-- 手 -->
    <circle cx="-35" cy="10" r="6" fill="#FFD4A3"/>
    <circle cx="35" cy="45" r="6" fill="#FFD4A3"/>
    
    <!-- 头 -->
    <circle cx="0" cy="0" r="20" fill="#FFD4A3"/>
    
    <!-- 头发 -->
    <path d="M -15 -8 Q -18 -15 -12 -18 Q -5 -20 0 -20 Q 5 -20 12 -18 Q 18 -15 15 -8" fill="#8B4513"/>
    
    <!-- 眼睛 -->
    <circle cx="-7" cy="-2" r="2" fill="#333"/>
    <circle cx="7" cy="-2" r="2" fill="#333"/>
    
    <!-- 微笑 -->
    <path d="M -8 5 Q 0 10 8 5" stroke="#333" stroke-width="2" fill="none" stroke-linecap="round"/>
    
    <!-- 腮红 -->
    <ellipse cx="-12" cy="3" rx="4" ry="3" fill="#FFB6C1" opacity="0.6"/>
    <ellipse cx="12" cy="3" rx="4" ry="3" fill="#FFB6C1" opacity="0.6"/>
  </g>
  
  <!-- 花朵装饰 -->
  <g transform="translate(200, 680)">
    <circle cx="0" cy="0" r="8" fill="#FF69B4"/>
    <circle cx="-8" cy="-5" r="6" fill="#FF69B4"/>
    <circle cx="8" cy="-5" r="6" fill="#FF69B4"/>
    <circle cx="-8" cy="5" r="6" fill="#FF69B4"/>
    <circle cx="8" cy="5" r="6" fill="#FF69B4"/>
    <circle cx="0" cy="0" r="4" fill="#FFD700"/>
  </g>
  
  <g transform="translate(950, 690)">
    <circle cx="0" cy="0" r="7" fill="#FFB6C1"/>
    <circle cx="-7" cy="-4" r="5" fill="#FFB6C1"/>
    <circle cx="7" cy="-4" r="5" fill="#FFB6C1"/>
    <circle cx="-7" cy="4" r="5" fill="#FFB6C1"/>
    <circle cx="7" cy="4" r="5" fill="#FFB6C1"/>
    <circle cx="0" cy="0" r="3" fill="#FFF"/>
  </g>
  
  <!-- 蝴蝶 -->
  <g transform="translate(400, 400)">
    <ellipse cx="-8" cy="0" rx="10" ry="15" fill="#FFD700" opacity="0.8"/>
    <ellipse cx="8" cy="0" rx="10" ry="15" fill="#FFD700" opacity="0.8"/>
    <ellipse cx="-8" cy="0" rx="6" ry="10" fill="#FFA500"/>
    <ellipse cx="8" cy="0" rx="6" ry="10" fill="#FFA500"/>
    <ellipse cx="0" cy="0" rx="3" ry="8" fill="#8B4513"/>
    <line x1="0" y1="-8" x2="-3" y2="-12" stroke="#333" stroke-width="1"/>
    <line x1="0" y1="-8" x2="3" y2="-12" stroke="#333" stroke-width="1"/>
  </g>
</svg>
